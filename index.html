<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakthrough — P4AI-DS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F5F2ED;
            --bg-subtle: #EDE9E2;
            --ink: #1A1916;
            --ink-muted: #6B6560;
            --ink-faint: #A8A39C;
            --accent: #B8782A;
            --accent-light: rgba(184,120,42,0.08);
            --border: rgba(26,25,22,0.10);
            --border-strong: rgba(26,25,22,0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Topbar ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 48px;
            border-bottom: 1px solid var(--border);
        }
        .topbar-logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--ink);
        }
        .topbar-logo span {
            color: var(--accent);
        }
        .topbar-tag {
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-faint);
        }

        /* ── Hero ── */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 24px;
        }

        /* Breakthrough mark — vertical line + horizon */
        .bt-mark {
            position: relative;
            width: 1px;
            height: 64px;
            background: linear-gradient(to bottom, transparent, var(--accent) 40%, var(--ink) 60%, transparent);
            margin-bottom: 52px;
        }
        .bt-mark::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -24px;
            width: calc(100px + 48px);
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent) 30%, var(--ink) 70%, transparent);
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 700;
            line-height: 0.95;
            letter-spacing: -0.02em;
            color: var(--ink);
            margin-bottom: 24px;
        }
        h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .hero-line {
            width: 48px;
            height: 2px;
            background: var(--accent);
            margin: 0 auto 28px;
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 300;
            color: var(--ink-muted);
            letter-spacing: 0.06em;
            max-width: 400px;
            line-height: 1.7;
            margin-bottom: 64px;
        }

        /* ── Members ── */
        .members {
            display: flex;
            align-items: center;
            gap: 2px;
            margin-bottom: 64px;
        }
        .member {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: 600;
            border: 1.5px solid var(--bg-subtle);
            color: var(--ink-muted);
            background: var(--bg-subtle);
            transition: all 0.2s;
            cursor: default;
        }
        .member:first-child { border-radius: 24px 4px 4px 24px; }
        .member:last-child  { border-radius: 4px 24px 24px 4px; }
        .member:hover {
            background: var(--ink);
            color: var(--bg);
            border-color: var(--ink);
            transform: translateY(-2px);
        }

        /* ── Assignments ── */
        .section-label {
            font-size: 0.68rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--ink-faint);
            margin-bottom: 12px;
        }

        .card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: transparent;
            border: 1px solid var(--border-strong);
            border-radius: 2px;
            padding: 20px 24px;
            text-decoration: none;
            color: var(--ink);
            width: 100%;
            max-width: 480px;
            transition: all 0.2s;
            margin-bottom: 12px;
        }
        .card:hover {
            background: var(--ink);
            color: var(--bg);
            border-color: var(--ink);
            transform: translateX(6px);
        }
        .card:hover .card-desc   { color: var(--ink-faint); }
        .card:hover .card-arrow  { color: var(--bg); }

        .card-left  { display: flex; align-items: center; gap: 16px; }
        .card-num {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            min-width: 32px;
        }
        .card:hover .card-num { color: var(--bg); }
        .card-title { font-weight: 600; font-size: 0.95rem; }
        .card-desc  { font-size: 0.75rem; color: var(--ink-muted); margin-top: 2px; transition: color 0.2s; }
        .card-arrow {
            font-size: 1.1rem;
            color: var(--ink-faint);
            transition: color 0.2s;
            flex-shrink: 0;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 28px;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: var(--ink-faint);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-logo">Breakthrough<span>.</span></div>
        <div class="topbar-tag">CO3135 · P4AI-DS · HCMUT</div>
    </div>

    <div class="hero">
        <div class="bt-mark"></div>

        <h1>Break<em>through</em></h1>
        <div class="hero-line"></div>
        <p class="subtitle">Nhóm sinh viên HCMUT — Khoa Khoa học Máy tính</p>

        <div class="members">
            <div class="member">A</div>
            <div class="member">B</div>
            <div class="member">C</div>
            <div class="member">D</div>
        </div>

        <div class="assignments">
            <div class="section-label">Assignments</div>
            <a class="card" href="./assign1-eda/">
                <div class="card-left">
                    <div class="card-num">01</div>
                    <div>
                        <div class="card-title">Exploratory Data Analysis</div>
                        <div class="card-desc">Tabular · Text · Image · Multimodal</div>
                    </div>
                </div>
                <span class="card-arrow">→</span>
            </a>
        </div>
    </div>

    <footer>
        Programming for AI and Data Science · HCMUT · 2025–2026
    </footer>
</body>
</html>
