<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakthrough — P4AI-DS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a3e 0%, #0a0a0f 70%);
        }
        .badge {
            display: inline-block;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.4);
            color: #818cf8;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 999px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e0e7ff, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 48px;
            max-width: 500px;
        }
        .members {
            display: flex;
            gap: 16px;
            margin-bottom: 56px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .member {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            border: 2px solid rgba(99,102,241,0.3);
        }
        .member:nth-child(1) { background: rgba(239,68,68,0.2); color: #fca5a5; border-color: rgba(239,68,68,0.4); }
        .member:nth-child(2) { background: rgba(59,130,246,0.2); color: #93c5fd; border-color: rgba(59,130,246,0.4); }
        .member:nth-child(3) { background: rgba(16,185,129,0.2); color: #6ee7b7; border-color: rgba(16,185,129,0.4); }
        .member:nth-child(4) { background: rgba(245,158,11,0.2); color: #fcd34d; border-color: rgba(245,158,11,0.4); }

        .assignments {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 480px;
        }
        .assignments-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #4b5563;
            margin-bottom: 4px;
            text-align: left;
        }
        .card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px 20px;
            text-decoration: none;
            color: #d1d5db;
            transition: border-color 0.2s, background 0.2s, transform 0.2s;
        }
        .card:hover {
            border-color: rgba(99,102,241,0.5);
            background: rgba(99,102,241,0.06);
            transform: translateX(4px);
        }
        .card-left { display: flex; align-items: center; gap: 14px; }
        .card-num {
            width: 32px; height: 32px;
            background: rgba(99,102,241,0.15);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; color: #818cf8;
        }
        .card-title { font-weight: 600; font-size: 0.95rem; }
        .card-desc { font-size: 0.78rem; color: #6b7280; margin-top: 2px; }
        .card-arrow { font-size: 1.2rem; color: #4b5563; }
        .card:hover .card-arrow { color: #818cf8; }

        footer {
            text-align: center;
            padding: 24px;
            font-size: 0.75rem;
            color: #374151;
            border-top: 1px solid rgba(255,255,255,0.04);
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="badge">CO3135 · P4AI-DS</div>
        <h1>Breakthrough</h1>
        <p class="subtitle">Nhóm sinh viên HCMUT — Khoa Khoa học Máy tính</p>

        <div class="members">
            <div class="member">A</div>
            <div class="member">B</div>
            <div class="member">C</div>
            <div class="member">D</div>
        </div>

        <div class="assignments">
            <div class="assignments-label">Assignments</div>
            <a class="card" href="./assign1-eda/">
                <div class="card-left">
                    <div class="card-num">01</div>
                    <div>
                        <div class="card-title">Exploratory Data Analysis</div>
                        <div class="card-desc">Tabular · Text · Image · Multimodal</div>
                    </div>
                </div>
                <span class="card-arrow">→</span>
            </a>
        </div>
    </div>

    <footer>
        Programming for AI and Data Science · HCMUT · 2025–2026
    </footer>
</body>
</html>
